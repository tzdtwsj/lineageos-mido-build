name: Build LineageOS 16.0 for Xiaomi Redmi Note 4 (mido)

on:
  workflow_dispatch:
    inputs:
      sync_source:
        description: '是否重新同步源码 (yes/no)'
        required: true
        default: 'no'
      make_clean:
        description: '是否清理编译输出 (clean/clobber/no)'
        required: true
        default: 'no'
  
  push:
    tags:
      - 'v*'
      - 'release-*'

env:
  WORK_DIR: ${{ github.workspace }}/android
  DEVICE: mido
  BRANCH: lineage-16.0
  VENDOR_COMMON_REPO: https://github.com/xiaomi-msm8953-devs/proprietary_vendor_xiaomi_msm8953-common
  VENDOR_COMMON_PATH: vendor/xiaomi/msm8953-common
  VENDOR_MIDO_REPO: https://github.com/NRanjan-17/vendor_xiaomi_mido
  VENDOR_MIDO_PATH: vendor/xiaomi/mido

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    
    steps:
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
          git gnupg gperf imagemagick lib32ncurses-dev lib32readline-dev \
          lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev \
          libssl-dev libwxgtk3.2-dev libxml2 libxml2-utils lzop \
          pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
          python3 python3-venv python-is-python3
          
    - name: Configure git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
    
    - name: Install repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH
    
    - name: Create working directory
      run: |
        mkdir -p ${{ env.WORK_DIR }}
        cd ${{ env.WORK_DIR }}
        pwd
    
    - name: Initialize repo
      working-directory: ${{ env.WORK_DIR }}
      run: |
        repo init -u https://github.com/LineageOS/android.git -b ${{ env.BRANCH }} --depth=1 --git-lfs --no-clone-bundle
    
    - name: Sync source
      working-directory: ${{ env.WORK_DIR }}
      run: |
        if [ "${{ github.event.inputs.sync_source }}" == "no" ] && [ -d "out" ]; then
          echo "Skipping sync as requested"
          exit 0
        fi
        
        echo "Disk space before sync:"
        df -h
        
        for i in {1..3}; do
          echo "Sync attempt $i"
          if repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune; then
            echo "Sync successful"
            break
          fi
          if [ $i -eq 3 ]; then
            echo "Sync failed after 3 attempts"
            exit 1
          fi
          echo "Sync failed, retrying in 30 seconds..."
          sleep 30
        done
        
        echo "Disk space after sync:"
        df -h
    
    - name: Sync common vendor repository
      working-directory: ${{ env.WORK_DIR }}
      run: |
        echo "Syncing common vendor repository: ${{ env.VENDOR_COMMON_REPO }}"
        
        # 创建 vendor 目录（如果不存在）
        mkdir -p ${{ env.VENDOR_COMMON_PATH }}
        
        # 检查是否已经存在 vendor 仓库
        if [ -d "${{ env.VENDOR_COMMON_PATH }}/.git" ]; then
          echo "Common vendor repository exists, updating..."
          cd ${{ env.VENDOR_COMMON_PATH }}
          git pull
          cd ${{ env.WORK_DIR }}
        else
          echo "Cloning common vendor repository..."
          # 克隆 vendor 仓库
          git clone --depth=1 ${{ env.VENDOR_COMMON_REPO }} ${{ env.VENDOR_COMMON_PATH }}
        fi
        
        # 验证 vendor 仓库是否成功克隆
        if [ -d "${{ env.VENDOR_COMMON_PATH }}" ]; then
          echo "✓ Common vendor repository synced successfully"
          echo "Common vendor repository contents:"
          ls -la ${{ env.VENDOR_COMMON_PATH }}/
        else
          echo "✗ Failed to sync common vendor repository"
          exit 1
        fi
    
    - name: Sync mido vendor repository
      working-directory: ${{ env.WORK_DIR }}
      run: |
        echo "Syncing mido vendor repository: ${{ env.VENDOR_MIDO_REPO }}"
        
        # 创建 vendor 目录（如果不存在）
        mkdir -p ${{ env.VENDOR_MIDO_PATH }}
        
        # 检查是否已经存在 vendor 仓库
        if [ -d "${{ env.VENDOR_MIDO_PATH }}/.git" ]; then
          echo "Mido vendor repository exists, updating..."
          cd ${{ env.VENDOR_MIDO_PATH }}
          git pull
          cd ${{ env.WORK_DIR }}
        else
          echo "Cloning mido vendor repository..."
          # 克隆 vendor 仓库
          git clone --depth=1 ${{ env.VENDOR_MIDO_REPO }} ${{ env.VENDOR_MIDO_PATH }}
        fi
        
        # 验证 vendor 仓库是否成功克隆
        if [ -d "${{ env.VENDOR_MIDO_PATH }}" ]; then
          echo "✓ Mido vendor repository synced successfully"
          echo "Mido vendor repository contents:"
          ls -la ${{ env.VENDOR_MIDO_PATH }}/
        else
          echo "✗ Failed to sync mido vendor repository"
          exit 1
        fi
    
    - name: Verify vendor structure
      working-directory: ${{ env.WORK_DIR }}
      run: |
        echo "Checking vendor directory structure..."
        
        # 检查公共 vendor 目录
        if [ -d "${{ env.VENDOR_COMMON_PATH }}" ]; then
          echo "✓ Common vendor found at ${{ env.VENDOR_COMMON_PATH }}"
        else
          echo "✗ Common vendor not found at ${{ env.VENDOR_COMMON_PATH }}"
        fi
        
        # 检查 mido vendor 目录
        if [ -d "${{ env.VENDOR_MIDO_PATH }}" ]; then
          echo "✓ Mido vendor found at ${{ env.VENDOR_MIDO_PATH }}"
        else
          echo "✗ Mido vendor not found at ${{ env.VENDOR_MIDO_PATH }}"
        fi
        
        # 显示 vendor 目录结构
        echo "Complete vendor/xiaomi structure:"
        find vendor/xiaomi -type d -maxdepth 2 2>/dev/null | sort || echo "vendor/xiaomi not found"
    
    - name: Setup ccache
      working-directory: ${{ env.WORK_DIR }}
      run: |
        export USE_CCACHE=1
        export CCACHE_DIR=${{ env.WORK_DIR }}/.ccache
        prebuilts/misc/linux-x86/ccache/ccache -M 10G
        echo "USE_CCACHE=1" >> ~/.bashrc
        echo "CCACHE_DIR=${{ env.WORK_DIR }}/.ccache" >> ~/.bashrc
    
    - name: Setup build environment
      working-directory: ${{ env.WORK_DIR }}
      run: |
        source build/envsetup.sh
        
        echo "Available combos:"
        lunch | head -30
        
        echo "Setting up build environment for ${{ env.DEVICE }}..."
        
        # 首先尝试 breakfast
        if breakfast ${{ env.DEVICE }}; then
          echo "✓ breakfast successful"
        else
          echo "breakfast failed, trying manual setup..."
          
          # 使用通用 ARM64 目标
          export TARGET_PRODUCT=lineage_arm64
          export TARGET_BUILD_VARIANT=userdebug
          
          if lunch lineage_arm64-userdebug; then
            echo "✓ lunch lineage_arm64-userdebug successful"
            
            # 手动设置设备变量
            export TARGET_DEVICE=${{ env.DEVICE }}
            export DEVICE_PATH=device/xiaomi/${{ env.DEVICE }}
            
            echo "Manual environment setup complete"
          else
            echo "✗ Failed to set up build environment"
            exit 1
          fi
        fi
        
        # 验证环境
        echo "Current environment:"
        echo "TARGET_PRODUCT: $TARGET_PRODUCT"
        echo "TARGET_DEVICE: $TARGET_DEVICE"
        echo "TARGET_BUILD_VARIANT: $TARGET_BUILD_VARIANT"
        
        # 检查必要的目录
        echo "Checking directories:"
        if [ -d "device/xiaomi/${{ env.DEVICE }}" ]; then
          echo "✓ device/xiaomi/${{ env.DEVICE }} exists"
          ls -la device/xiaomi/${{ env.DEVICE }}/ | head -10
        else
          echo "✗ device/xiaomi/${{ env.DEVICE }} not found"
        fi
        
        if [ -d "vendor/xiaomi/mido" ]; then
          echo "✓ vendor/xiaomi/mido exists"
        elif [ -d "vendor/xiaomi/msm8953-common" ]; then
          echo "✓ vendor/xiaomi/msm8953-common exists"
        else
          echo "✗ No vendor directory found"
        fi
        
        echo "✓ Build environment setup complete"
    
    - name: Clean build if requested
      working-directory: ${{ env.WORK_DIR }}
      if: github.event.inputs.make_clean == 'clean' || github.event.inputs.make_clean == 'clobber'
      run: |
        source build/envsetup.sh
        if [ "${{ github.event.inputs.make_clean }}" == "clean" ]; then
          make clean
        else
          make clobber
        fi
    
    - name: Start build
      id: build
      working-directory: ${{ env.WORK_DIR }}
      continue-on-error: false
      run: |
        source build/envsetup.sh
        
        echo "Disk space before build:"
        df -h
        
        # 设置构建目标
        echo "Setting up build environment for mido..."
        
        # 首先尝试使用 breakfast（这是 LineageOS 推荐的方式）
        if breakfast mido; then
          echo "✓ breakfast mido successful"
        else
          echo "breakfast failed, trying alternative approach..."
          
          # 设置基础架构目标
          export TARGET_PRODUCT=lineage_arm64
          export TARGET_BUILD_VARIANT=userdebug
          
          # 尝试 lunch 使用通用 arm64 目标
          echo "Trying lunch with lineage_arm64-userdebug"
          if lunch lineage_arm64-userdebug; then
            echo "✓ lunch lineage_arm64-userdebug successful"
            
            # 手动设置设备变量
            export TARGET_DEVICE=mido
            export TARGET_PRODUCT=lineage_mido
            
            # 添加设备树到路径
            if [ -d "device/xiaomi/mido" ]; then
              echo "Adding device/xiaomi/mido to device path"
              export DEVICE_PATH=device/xiaomi/mido
            fi
          else
            echo "✗ Failed to set up build environment"
            exit 1
          fi
        fi
        
        # 验证环境设置
        echo "Current build variables:"
        echo "TARGET_PRODUCT: $TARGET_PRODUCT"
        echo "TARGET_DEVICE: $TARGET_DEVICE"
        echo "TARGET_BUILD_VARIANT: $TARGET_BUILD_VARIANT"
        
        # 检查设备树是否正确加载
        echo "Checking device tree:"
        if [ -n "$TARGET_DEVICE" ] && [ "$TARGET_DEVICE" = "mido" ]; then
          echo "✓ Device is set to mido"
        else
          echo "⚠️ Device not set to mido, attempting to fix..."
          export TARGET_DEVICE=mido
        fi
        
        # 检查 vendor 文件
        echo "Checking vendor files before build:"
        if [ -f "vendor/xiaomi/mido/BoardConfigVendor.mk" ]; then
          echo "✓ Vendor files are ready"
        else
          echo "⚠️ Warning: BoardConfigVendor.mk not found, build might fail"
          echo "Contents of vendor/xiaomi:"
          ls -la vendor/xiaomi/ 2>/dev/null || echo "vendor/xiaomi not found"
          echo "Contents of vendor/xiaomi/mido:"
          ls -la vendor/xiaomi/mido/ 2>/dev/null || echo "vendor/xiaomi/mido not found"
          echo "Contents of vendor/xiaomi/msm8953-common:"
          ls -la vendor/xiaomi/msm8953-common/ 2>/dev/null || echo "vendor/xiaomi/msm8953-common not found"
        fi
        
        # 确保 vendor 配置文件存在
        if [ ! -f "vendor/xiaomi/mido/BoardConfigVendor.mk" ] && [ -f "vendor/xiaomi/msm8953-common/BoardConfigVendor.mk" ]; then
          echo "Creating symlink for BoardConfigVendor.mk..."
          mkdir -p vendor/xiaomi/mido
          ln -sf ../msm8953-common/BoardConfigVendor.mk vendor/xiaomi/mido/BoardConfigVendor.mk
        fi
        
        # 检查设备配置文件
        if [ -f "device/xiaomi/mido/lineage_mido.mk" ]; then
          echo "✓ Device makefile found"
          # 显示设备配置
          head -20 device/xiaomi/mido/lineage_mido.mk
        else
          echo "⚠️ Warning: device/xiaomi/mido/lineage_mido.mk not found"
        fi
        
        # 开始编译
        echo "Starting build for mido..."
        echo "Using command: mka bacon -j$(nproc --all)"
        
        mka bacon -j$(nproc --all) 2>&1 | tee build.log
        
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "Build failed!"
          exit 1
        fi
        
        echo "Disk space after build:"
        df -h
    
    - name: Find artifacts
      id: find_artifacts
      working-directory: ${{ env.WORK_DIR }}
      run: |
        TARGET_DIR="out/target/product/${{ env.DEVICE }}"
        
        ROM_ZIP=$(find ${TARGET_DIR} -maxdepth 1 -name "lineage-*.zip" -not -name "*ota*" -not -name "*signed*" | head -n 1)
        ROM_MD5=$(find ${TARGET_DIR} -maxdepth 1 -name "lineage-*.md5sum" | head -n 1)
        RECOVERY_IMG=$(find ${TARGET_DIR} -maxdepth 1 -name "recovery.img" | head -n 1)
        BOOT_IMG=$(find ${TARGET_DIR} -maxdepth 1 -name "boot.img" | head -n 1)
        
        echo "rom_zip=${ROM_ZIP}" >> $GITHUB_OUTPUT
        echo "rom_md5=${ROM_MD5}" >> $GITHUB_OUTPUT
        echo "recovery_img=${RECOVERY_IMG}" >> $GITHUB_OUTPUT
        echo "boot_img=${BOOT_IMG}" >> $GITHUB_OUTPUT
        
        if [ -f "build.log" ]; then
          cp build.log ${TARGET_DIR}/build.log 2>/dev/null || true
        fi
    
    - name: Create Release and upload assets
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        name: LineageOS 16.0 for mido ${{ github.ref_name }}
        body: |
          ## LineageOS 16.0 (Android 9.0) for Xiaomi Redmi Note 4 (mido)
          
          ### ⚡ 编译信息
          - 编译时间: ${{ github.event.repository.updated_at }}
          - 触发者: ${{ github.actor }}
          - 工作流运行ID: ${{ github.run_id }}
          
          ### 📦 包含文件
          - ROM包 (lineage-*.zip)
          - MD5校验文件
          - Recovery镜像
          - Boot镜像
          - 编译日志
          
          ### ⚠️ 注意事项
          - 这是GitHub Actions自动构建版本
          - 刷机前请做好数据备份
          - 建议使用最新版TWRP刷入
        files: |
          ${{ steps.find_artifacts.outputs.rom_zip }}
          ${{ steps.find_artifacts.outputs.rom_md5 }}
          ${{ steps.find_artifacts.outputs.recovery_img }}
          ${{ steps.find_artifacts.outputs.boot_img }}
          ${{ env.WORK_DIR }}/out/target/product/${{ env.DEVICE }}/build.log
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload artifacts (manual trigger)
      uses: actions/upload-artifact@v4
      if: github.event_name == 'workflow_dispatch'
      with:
        name: lineageos-16-mido-${{ github.run_number }}
        path: |
          ${{ steps.find_artifacts.outputs.rom_zip }}
          ${{ steps.find_artifacts.outputs.rom_md5 }}
          ${{ steps.find_artifacts.outputs.recovery_img }}
          ${{ steps.find_artifacts.outputs.boot_img }}
          ${{ env.WORK_DIR }}/out/target/product/${{ env.DEVICE }}/build.log
        retention-days: 30
        if-no-files-found: warn
