name: Build LineageOS 16.0 for Xiaomi Redmi Note 4 (mido)

on:
  workflow_dispatch:
    inputs:
      sync_source:
        description: '是否重新同步源码 (yes/no)'
        required: true
        default: 'no'
      make_clean:
        description: '是否清理编译输出 (clean/clobber/no)'
        required: true
        default: 'no'
  
  push:
    tags:
      - 'v*'
      - 'release-*'

env:
  # 工作目录
  WORK_DIR: ${{ github.workspace }}/android
  
  # 设备信息
  DEVICE: mido
  BRANCH: lineage-16.0
  
  # Kernel 配置
  KERNEL_REPO: https://github.com/LineageOS/android_kernel_xiaomi_msm8953
  KERNEL_PATH: kernel/xiaomi/msm8953
  KERNEL_BRANCH: lineage-16.0
  
  # Device Tree 配置
  DEVICE_TREE_REPO: https://github.com/LineageOS/android_device_xiaomi_mido
  DEVICE_TREE_PATH: device/xiaomi/mido
  DEVICE_TREE_BRANCH: lineage-16.0
  
  # Common Device Tree 配置
  DEVICE_COMMON_REPO: https://github.com/LineageOS/android_device_xiaomi_msm8953-common
  DEVICE_COMMON_PATH: device/xiaomi/msm8953-common
  DEVICE_COMMON_BRANCH: lineage-16.0
  
  # Vendor 配置 - 合并为一个仓库
  VENDOR_REPO: https://github.com/zeelog/proprietary_vendor_xiaomi
  VENDOR_PATH: vendor/xiaomi
  VENDOR_BRANCH: lineage-16.0

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    
    steps:
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
          git gnupg gperf imagemagick lib32ncurses-dev lib32readline-dev \
          lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev \
          libssl-dev libwxgtk3.2-dev libxml2 libxml2-utils lzop \
          pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
          python3 python3-venv python-is-python3
          
    - name: Configure git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
    
    - name: Install repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH
    
    - name: Create working directory
      run: |
        mkdir -p ${{ env.WORK_DIR }}
        cd ${{ env.WORK_DIR }}
        pwd
    
    - name: Initialize repo
      working-directory: ${{ env.WORK_DIR }}
      run: |
        repo init -u https://github.com/LineageOS/android.git -b ${{ env.BRANCH }} --depth=1
    
    - name: Sync source
      working-directory: ${{ env.WORK_DIR }}
      run: |
        if [ "${{ github.event.inputs.sync_source }}" == "no" ] && [ -d "out" ]; then
          echo "Skipping sync as requested"
          exit 0
        fi
        
        echo "Disk space before sync:"
        df -h
        
        for i in {1..3}; do
          echo "Sync attempt $i"
          if repo sync -c -j$(nproc --all) --force-sync --no-tags --optimized-fetch --prune; then
            echo "Sync successful"
            break
          fi
          if [ $i -eq 3 ]; then
            echo "Sync failed after 3 attempts"
            exit 1
          fi
          echo "Sync failed, retrying in 30 seconds..."
          sleep 30
        done
        
        echo "Disk space after sync:"
        df -h
    
    - name: Clone device tree
      working-directory: ${{ env.WORK_DIR }}
      run: |
        echo "Cloning device tree from ${{ env.DEVICE_TREE_REPO }} (branch: ${{ env.DEVICE_TREE_BRANCH }})"
        git clone --depth=1 --branch ${{ env.DEVICE_TREE_BRANCH }} ${{ env.DEVICE_TREE_REPO }} ${{ env.DEVICE_TREE_PATH }}
    
    - name: Clone common device tree
      working-directory: ${{ env.WORK_DIR }}
      run: |
        echo "Cloning common device tree from ${{ env.DEVICE_COMMON_REPO }} (branch: ${{ env.DEVICE_COMMON_BRANCH }})"
        git clone --depth=1 --branch ${{ env.DEVICE_COMMON_BRANCH }} ${{ env.DEVICE_COMMON_REPO }} ${{ env.DEVICE_COMMON_PATH }}
    
    - name: Clone kernel
      working-directory: ${{ env.WORK_DIR }}
      run: |
        echo "Cloning kernel from ${{ env.KERNEL_REPO }} (branch: ${{ env.KERNEL_BRANCH }})"
        git clone --depth=1 --branch ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_REPO }} ${{ env.KERNEL_PATH }}
    
    - name: Clone vendor repository
      working-directory: ${{ env.WORK_DIR }}
      run: |
        echo "Cloning vendor from ${{ env.VENDOR_REPO }} (branch: ${{ env.VENDOR_BRANCH }})"
        git clone --depth=1 --branch ${{ env.VENDOR_BRANCH }} ${{ env.VENDOR_REPO }} ${{ env.VENDOR_PATH }}
        
        # 验证 vendor 结构
        echo "Vendor repository contents:"
        ls -la ${{ env.VENDOR_PATH }}/
        
        # 检查 mido 相关的 vendor 目录
        if [ -d "${{ env.VENDOR_PATH }}/mido" ]; then
          echo "✓ Found mido vendor directory"
        else
          echo "⚠️ Warning: mido vendor directory not found"
        fi
        
        if [ -d "${{ env.VENDOR_PATH }}/msm8953-common" ]; then
          echo "✓ Found msm8953-common vendor directory"
        else
          echo "⚠️ Warning: msm8953-common vendor directory not found"
        fi
    
    - name: Create vendor symlinks if needed
      working-directory: ${{ env.WORK_DIR }}
      run: |
        echo "Checking and creating vendor symlinks..."
        
        # 确保 BoardConfigVendor.mk 存在
        if [ ! -f "${{ env.VENDOR_PATH }}/mido/BoardConfigVendor.mk" ] && [ -f "${{ env.VENDOR_PATH }}/msm8953-common/BoardConfigVendor.mk" ]; then
          echo "Creating symlink for BoardConfigVendor.mk..."
          mkdir -p ${{ env.VENDOR_PATH }}/mido
          ln -sf ../msm8953-common/BoardConfigVendor.mk ${{ env.VENDOR_PATH }}/mido/BoardConfigVendor.mk
        fi
    
    - name: Verify directory structure
      working-directory: ${{ env.WORK_DIR }}
      run: |
        echo "Checking directory structure..."
        
        directories=(
          "${{ env.DEVICE_TREE_PATH }}"
          "${{ env.DEVICE_COMMON_PATH }}"
          "${{ env.KERNEL_PATH }}"
          "${{ env.VENDOR_PATH }}"
        )
        
        for dir in "${directories[@]}"; do
          if [ -d "$dir" ]; then
            echo "✓ $dir exists"
            # 显示目录内容的前几项
            ls -la "$dir" | head -5
          else
            echo "✗ $dir not found"
          fi
        done
        
        # 特别检查 vendor 子目录
        echo "Vendor subdirectories:"
        if [ -d "${{ env.VENDOR_PATH }}/mido" ]; then
          echo "✓ vendor/xiaomi/mido exists"
        fi
        if [ -d "${{ env.VENDOR_PATH }}/msm8953-common" ]; then
          echo "✓ vendor/xiaomi/msm8953-common exists"
        fi
    
    - name: Setup ccache
      working-directory: ${{ env.WORK_DIR }}
      run: |
        export USE_CCACHE=1
        export CCACHE_DIR=${{ env.WORK_DIR }}/.ccache
        prebuilts/misc/linux-x86/ccache/ccache -M 10G
        echo "USE_CCACHE=1" >> ~/.bashrc
        echo "CCACHE_DIR=${{ env.WORK_DIR }}/.ccache" >> ~/.bashrc
    
    - name: Setup build environment
      working-directory: ${{ env.WORK_DIR }}
      run: |
        source build/envsetup.sh
        
        echo "Setting up build environment for ${{ env.DEVICE }}..."
        
        # 尝试 breakfast
        if breakfast ${{ env.DEVICE }}; then
          echo "✓ breakfast successful"
        else
          echo "breakfast failed, trying lunch with lineage_arm64..."
          export TARGET_PRODUCT=lineage_arm64
          export TARGET_BUILD_VARIANT=userdebug
          
          if lunch lineage_arm64-userdebug; then
            echo "✓ lunch successful"
            export TARGET_DEVICE=${{ env.DEVICE }}
          else
            echo "✗ Failed to set up build environment"
            exit 1
          fi
        fi
        
        # 显示环境变量
        echo "Build environment:"
        echo "TARGET_PRODUCT: $TARGET_PRODUCT"
        echo "TARGET_DEVICE: $TARGET_DEVICE"
        echo "TARGET_BUILD_VARIANT: $TARGET_BUILD_VARIANT"
        
        # 验证 vendor 配置
        if [ -f "${{ env.VENDOR_PATH }}/mido/BoardConfigVendor.mk" ]; then
          echo "✓ Vendor configuration found"
        else
          echo "⚠️ Vendor configuration not found"
        fi
    
    - name: Clean build if requested
      working-directory: ${{ env.WORK_DIR }}
      if: github.event.inputs.make_clean == 'clean' || github.event.inputs.make_clean == 'clobber'
      run: |
        source build/envsetup.sh
        if [ "${{ github.event.inputs.make_clean }}" == "clean" ]; then
          make clean
        else
          make clobber
        fi
    
    - name: Start build
      id: build
      working-directory: ${{ env.WORK_DIR }}
      run: |
        source build/envsetup.sh
        
        echo "Disk space before build:"
        df -h
        
        echo "Starting build for ${{ env.DEVICE }}..."
        echo "Build started at: $(date)"
        
        # 开始编译
        mka bacon -j$(nproc --all) 2>&1 | tee build.log
        
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "Build failed!"
          echo "Last 50 lines of build log:"
          tail -50 build.log
          exit 1
        fi
        
        echo "Build completed at: $(date)"
        echo "Disk space after build:"
        df -h
    
    - name: Find artifacts
      id: find_artifacts
      working-directory: ${{ env.WORK_DIR }}
      run: |
        TARGET_DIR="out/target/product/${{ env.DEVICE }}"
        
        if [ ! -d "$TARGET_DIR" ]; then
          echo "Error: Target directory not found"
          exit 1
        fi
        
        ROM_ZIP=$(find ${TARGET_DIR} -maxdepth 1 -name "lineage-*.zip" ! -name "*ota*" ! -name "*signed*" | head -n 1)
        ROM_MD5=$(find ${TARGET_DIR} -maxdepth 1 -name "lineage-*.md5sum" | head -n 1)
        RECOVERY_IMG=$(find ${TARGET_DIR} -maxdepth 1 -name "recovery.img" | head -n 1)
        BOOT_IMG=$(find ${TARGET_DIR} -maxdepth 1 -name "boot.img" | head -n 1)
        
        echo "rom_zip=${ROM_ZIP}" >> $GITHUB_OUTPUT
        echo "rom_md5=${ROM_MD5}" >> $GITHUB_OUTPUT
        echo "recovery_img=${RECOVERY_IMG}" >> $GITHUB_OUTPUT
        echo "boot_img=${BOOT_IMG}" >> $GITHUB_OUTPUT
        
        # 复制构建日志
        if [ -f "build.log" ]; then
          cp build.log ${TARGET_DIR}/build.log 2>/dev/null || true
        fi
        
        echo "Found artifacts:"
        echo "ROM: ${ROM_ZIP}"
        echo "MD5: ${ROM_MD5}"
        echo "Recovery: ${RECOVERY_IMG}"
        echo "Boot: ${BOOT_IMG}"
    
    - name: Create Release and upload assets
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        name: LineageOS 16.0 for mido ${{ github.ref_name }}
        body: |
          ## LineageOS 16.0 (Android 9.0) for Xiaomi Redmi Note 4 (mido)
          
          ### 编译信息
          - 编译时间: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          - 触发者: ${{ github.actor }}
          - 运行ID: ${{ github.run_id }}
          
          ### 包含文件
          ${{ steps.find_artifacts.outputs.rom_zip && '- ROM包 (lineage-*.zip)' || '' }}
          ${{ steps.find_artifacts.outputs.rom_md5 && '- MD5校验文件' || '' }}
          ${{ steps.find_artifacts.outputs.recovery_img && '- Recovery镜像' || '' }}
          ${{ steps.find_artifacts.outputs.boot_img && '- Boot镜像' || '' }}
          - 编译日志
          
          ### 注意事项
          - GitHub Actions自动构建版本
          - 刷机前请做好数据备份
          - 建议使用最新版TWRP刷入
        files: |
          ${{ steps.find_artifacts.outputs.rom_zip }}
          ${{ steps.find_artifacts.outputs.rom_md5 }}
          ${{ steps.find_artifacts.outputs.recovery_img }}
          ${{ steps.find_artifacts.outputs.boot_img }}
          ${{ env.WORK_DIR }}/out/target/product/${{ env.DEVICE }}/build.log
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload artifacts (manual trigger)
      uses: actions/upload-artifact@v4
      if: github.event_name == 'workflow_dispatch'
      with:
        name: lineageos-16-mido-${{ github.run_number }}
        path: |
          ${{ steps.find_artifacts.outputs.rom_zip }}
          ${{ steps.find_artifacts.outputs.rom_md5 }}
          ${{ steps.find_artifacts.outputs.recovery_img }}
          ${{ steps.find_artifacts.outputs.boot_img }}
          ${{ env.WORK_DIR }}/out/target/product/${{ env.DEVICE }}/build.log
        retention-days: 30
        if-no-files-found: warn
