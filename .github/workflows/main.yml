name: Build LineageOS 16.0 for Xiaomi Redmi Note 4 (mido)

# 触发条件优化：支持手动触发和标签推送
on:
  # 允许手动触发（推荐使用这种方式）
  workflow_dispatch:
    inputs:
      sync_source:
        description: '是否重新同步源码 (yes/no)'
        required: true
        default: 'no'
      make_clean:
        description: '是否清理编译输出 (clean/clobber/no)'
        required: true
        default: 'no'
  
  # 也可以选择通过标签触发
  push:
    tags:
      - 'v*'
      - 'release-*'

# 环境变量
env:
  # 使用更大的临时目录
  WORK_DIR: /mnt/build/android
  DEVICE: mido
  BRANCH: lineage-16.0
  # 你的GitHub用户名（用于local_manifests）
  GH_USERNAME: tzdtwsj

jobs:
  build:
    # 改用 ubuntu-latest 以获得更快的分配速度
    runs-on: ubuntu-latest
    
    # 增加超时时间到8小时
    timeout-minutes: 480
    
    steps:
    # 1. 最大化磁盘空间（这是编译成功的关键）
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 8192
        swap-size-mb: 8192
        remove-dotnet: true
        remove-android: true
        remove-haskell: true
        remove-codeql: true
        build-mount-path: /mnt/build
        # 额外清理不必要的软件包
        remove-docker-images: true
    
    # 2. 检出你的仓库（包含local_manifests）
    - name: Checkout local_manifests
      uses: actions/checkout@v4
      with:
        path: ${{ env.WORK_DIR }}/local_manifests
    
    # 3. 安装编译依赖
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
          git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev \
          lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev \
          libssl-dev libwxgtk3.0-gtk3-dev libxml2 libxml2-utils lzop \
          pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
          python3 python3-venv python-is-python3
          
    # 4. 配置Git
    - name: Configure git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
    
    # 5. 安装repo工具
    - name: Install repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH
    
    # 6. 创建并进入工作目录
    - name: Create working directory
      run: |
        sudo mkdir -p ${{ env.WORK_DIR }}
        sudo chown -R $USER:$USER ${{ env.WORK_DIR }}
        cd ${{ env.WORK_DIR }}
    
    # 7. 初始化repo（使用深度克隆节省空间）
    - name: Initialize repo
      working-directory: ${{ env.WORK_DIR }}
      run: |
        repo init -u https://github.com/LineageOS/android.git -b ${{ env.BRANCH }} --depth=1
    
    # 8. 复制local_manifests
    - name: Setup local manifests
      run: |
        if [ -d "${{ env.WORK_DIR }}/local_manifests" ]; then
          mkdir -p ${{ env.WORK_DIR }}/.repo/local_manifests
          cp -v ${{ env.WORK_DIR }}/local_manifests/*.xml ${{ env.WORK_DIR }}/.repo/local_manifests/ 2>/dev/null || echo "No XML files found"
        fi
        # 如果local_manifests不存在，创建一个基础的
        if [ ! -d "${{ env.WORK_DIR }}/.repo/local_manifests" ]; then
          mkdir -p ${{ env.WORK_DIR }}/.repo/local_manifests
          cat > ${{ env.WORK_DIR }}/.repo/local_manifests/mido.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<manifest>
  <!-- mido device tree -->
  <project name="LineageOS/android_device_xiaomi_mido" path="device/xiaomi/mido" remote="github" revision="lineage-16.0" />
  <!-- mido vendor tree -->
  <project name="TheMuppets/proprietary_vendor_xiaomi" path="vendor/xiaomi" remote="github" revision="lineage-16.0" />
  <!-- mido kernel tree -->
  <project name="LineageOS/android_kernel_xiaomi_msm8953" path="kernel/xiaomi/msm8953" remote="github" revision="lineage-16.0" />
</manifest>
EOF
        fi
    
    # 9. 同步源码（带重试机制）
    - name: Sync source
      working-directory: ${{ env.WORK_DIR }}
      run: |
        # 如果手动触发时选择不重新同步，且源码已存在，则跳过
        if [ "${{ github.event.inputs.sync_source }}" == "no" ] && [ -d "out" ]; then
          echo "Skipping sync as requested"
          exit 0
        fi
        
        # 同步源码，最多重试3次
        for i in {1..3}; do
          echo "Sync attempt $i"
          if repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune; then
            echo "Sync successful"
            break
          fi
          if [ $i -eq 3 ]; then
            echo "Sync failed after 3 attempts"
            exit 1
          fi
          echo "Sync failed, retrying in 30 seconds..."
          sleep 30
        done
    
    # 10. 设置ccache
    - name: Setup ccache
      working-directory: ${{ env.WORK_DIR }}
      run: |
        export USE_CCACHE=1
        export CCACHE_DIR=${{ env.WORK_DIR }}/.ccache
        prebuilts/misc/linux-x86/ccache/ccache -M 20G
        echo "USE_CCACHE=1" >> ~/.bashrc
        echo "CCACHE_DIR=${{ env.WORK_DIR }}/.ccache" >> ~/.bashrc
    
    # 11. 设置编译环境并准备编译
    - name: Setup build environment
      working-directory: ${{ env.WORK_DIR }}
      run: |
        source build/envsetup.sh
        # 准备设备
        breakfast ${{ env.DEVICE }}
    
    # 12. 清理（可选）
    - name: Clean build if requested
      working-directory: ${{ env.WORK_DIR }}
      if: github.event.inputs.make_clean == 'clean' || github.event.inputs.make_clean == 'clobber'
      run: |
        source build/envsetup.sh
        if [ "${{ github.event.inputs.make_clean }}" == "clean" ]; then
          make clean
        else
          make clobber
        fi
    
    # 13. 开始编译
    - name: Start build
      id: build
      working-directory: ${{ env.WORK_DIR }}
      continue-on-error: false
      run: |
        source build/envsetup.sh
        # 编译ROM包
        mka bacon -j$(nproc --all) 2>&1 | tee build.log
        
        # 检查编译是否成功
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "Build failed!"
          exit 1
        fi
    
    # 14. 查找编译产物
    - name: Find artifacts
      id: find_artifacts
      working-directory: ${{ env.WORK_DIR }}
      run: |
        TARGET_DIR="out/target/product/${{ env.DEVICE }}"
        
        # 查找ROM包
        ROM_ZIP=$(find ${TARGET_DIR} -maxdepth 1 -name "lineage-*.zip" -not -name "*ota*" -not -name "*signed*" | head -n 1)
        ROM_MD5=$(find ${TARGET_DIR} -maxdepth 1 -name "lineage-*.md5sum" | head -n 1)
        RECOVERY_IMG=$(find ${TARGET_DIR} -maxdepth 1 -name "recovery.img" | head -n 1)
        BOOT_IMG=$(find ${TARGET_DIR} -maxdepth 1 -name "boot.img" | head -n 1)
        
        # 保存到输出变量
        echo "rom_zip=${ROM_ZIP}" >> $GITHUB_OUTPUT
        echo "rom_md5=${ROM_MD5}" >> $GITHUB_OUTPUT
        echo "recovery_img=${RECOVERY_IMG}" >> $GITHUB_OUTPUT
        echo "boot_img=${BOOT_IMG}" >> $GITHUB_OUTPUT
        
        # 也保存编译日志
        cp build.log ${TARGET_DIR}/build.log 2>/dev/null || true
    
    # 15. 创建Release并上传（只有推送tag时才执行）
    - name: Create Release and upload assets
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        name: LineageOS 16.0 for mido ${{ github.ref_name }}
        body: |
          ## LineageOS 16.0 (Android 9.0) for Xiaomi Redmi Note 4 (mido)
          
          ### ⚡ 编译信息
          - 编译时间: ${{ github.event.repository.updated_at }}
          - 触发者: ${{ github.actor }}
          - 工作流运行ID: ${{ github.run_id }}
          
          ### 📦 包含文件
          - ROM包 (lineage-*.zip)
          - MD5校验文件
          - Recovery镜像
          - Boot镜像
          - 编译日志
          
          ### ⚠️ 注意事项
          - 这是GitHub Actions自动构建版本
          - 刷机前请做好数据备份
          - 建议使用最新版TWRP刷入
        files: |
          ${{ steps.find_artifacts.outputs.rom_zip }}
          ${{ steps.find_artifacts.outputs.rom_md5 }}
          ${{ steps.find_artifacts.outputs.recovery_img }}
          ${{ steps.find_artifacts.outputs.boot_img }}
          ${{ env.WORK_DIR }}/out/target/product/${{ env.DEVICE }}/build.log
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    # 16. 如果是手动触发，将产物上传到Artifacts（即使没有tag）
    - name: Upload artifacts (manual trigger)
      uses: actions/upload-artifact@v4
      if: github.event_name == 'workflow_dispatch'
      with:
        name: lineageos-16-mido-${{ github.run_number }}
        path: |
          ${{ steps.find_artifacts.outputs.rom_zip }}
          ${{ steps.find_artifacts.outputs.rom_md5 }}
          ${{ steps.find_artifacts.outputs.recovery_img }}
          ${{ steps.find_artifacts.outputs.boot_img }}
          ${{ env.WORK_DIR }}/out/target/product/${{ env.DEVICE }}/build.log
        retention-days: 30
        if-no-files-found: warn
